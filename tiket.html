<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bigu Festival 2026 - Additional Ticket</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#4f315f,#7a5690);color:#fff;transition:opacity .45s ease;overflow-x:hidden}
.hero img{width:100%;display:block;max-width:900px;margin:auto;border-radius:0 0 30px 30px}
.container{max-width:900px;margin:auto;padding:20px 16px 120px}
.title{text-align:center;margin:20px 0}
.title h1{font-size:32px;font-weight:900}
.subtitle{opacity:.85}
.ticket{background:rgba(255,255,255,.12);backdrop-filter:blur(18px);border-radius:28px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.price{margin-top:6px;font-size:22px;font-weight:900;color:#ffe7ff}
.badge{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:999px;background:#cda6df;color:#4d2e5c;font-size:12px;font-weight:700}
.stock{margin-top:10px;padding:8px 12px;border-radius:12px;background:rgba(255,80,80,.2);font-weight:900;animation:pulse 1.2s infinite}
@keyframes pulse{50%{transform:scale(1.05)}}
.counter{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.12);padding:8px;border-radius:999px}
.counter button{width:42px;height:42px;border:none;border-radius:50%;font-size:22px;font-weight:700;cursor:pointer}
.qty{width:35px;text-align:center;font-weight:900;font-size:20px}
.checkout-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(40,20,50,.96);padding:14px}
.checkout-wrap{max-width:900px;margin:auto;display:flex;justify-content:space-between;align-items:center}
.total{font-size:26px;font-weight:900}
.checkout-btn{border:none;padding:16px 24px;border-radius:16px;font-weight:900;cursor:pointer;background:#fff;color:#5a396c}
</style>
</head>
<body>

<div class="container">

<div class="ticket">
<div>
<h3>DAY 1 PASS</h3>
<div class="price">Rp225.000</div>
<div class="badge">AVAILABLE</div>
<div class="stock" id="stock1">⚠️ TERSISA 40 TIKET</div>
</div>
<div class="counter">
<button onclick="setQty('d1',-1)">−</button>
<div id="d1" class="qty">0</div>
<button onclick="setQty('d1',1)">+</button>
</div>
</div>

<div class="ticket">
<div>
<h3>DAY 2 PASS</h3>
<div class="price">Rp225.000</div>
<div class="badge">AVAILABLE</div>
<div class="stock" id="stock2">⚠️ TERSISA 30 TIKET</div>
</div>
<div class="counter">
<button onclick="setQty('d2',-1)">−</button>
<div id="d2" class="qty">0</div>
<button onclick="setQty('d2',1)">+</button>
</div>
</div>

<div class="ticket">
<div>
<h3>2 DAY PASS</h3>
<div class="price">Rp395.000</div>
<div class="badge">BEST VALUE</div>
<div class="stock" id="stock3">⚠️ TERSISA 20 TIKET</div>
</div>
<div class="counter">
<button onclick="setQty('d3',-1)">−</button>
<div id="d3" class="qty">0</div>
<button onclick="setQty('d3',1)">+</button>
</div>
</div>

</div>

<div class="checkout-bar">
<div class="checkout-wrap">
<div><div>TOTAL PEMBAYARAN</div><div class="total" id="total">Rp0</div></div>
<button class="checkout-btn" onclick="checkout()">LANJUT PEMBAYARAN</button>
</div>
</div>

<script>
const p={d1:225000,d2:225000,d3:395000};
const q={d1:0,d2:0,d3:0};

function setQty(id,v){
q[id]=Math.max(0,q[id]+v);
document.getElementById(id).innerText=q[id];
update();
}

function update(){
let t=q.d1*p.d1+q.d2*p.d2+q.d3*p.d3;
document.getElementById('total').innerText='Rp'+t.toLocaleString('id-ID');
}

function checkout(){
let total=(q.d1*p.d1)+(q.d2*p.d2)+(q.d3*p.d3);
let jumlah=q.d1+q.d2+q.d3;

if(jumlah===0){
alert('Silakan pilih tiket terlebih dahulu');
return;
}

let jenis=[];
if(q.d1>0) jenis.push('DAY 1 PASS x'+q.d1);
if(q.d2>0) jenis.push('DAY 2 PASS x'+q.d2);
if(q.d3>0) jenis.push('2 DAY PASS x'+q.d3);

localStorage.setItem('totalPembayaran',total);
localStorage.setItem('jumlahTiket',jumlah);
localStorage.setItem('jenisTiket',jenis.join(', '));

const btn=document.querySelector('.checkout-btn');
btn.disabled=true;
btn.innerHTML='Memproses...';

document.body.style.opacity='0';

setTimeout(function(){
window.location.href='form.html';
},450);
}

let s1=40,s2=30,s3=20;

setInterval(()=>{
if(s1>1){s1--;document.getElementById('stock1').innerHTML='⚠️ TERSISA '+s1+' TIKET';}
},60000);

setInterval(()=>{
if(s2>1){s2--;document.getElementById('stock2').innerHTML='⚠️ TERSISA '+s2+' TIKET';}
},60000);

setInterval(()=>{
if(s3>1){s3--;document.getElementById('stock3').innerHTML='⚠️ TERSISA '+s3+' TIKET';}
},60000);
</script>
</body>
</html>
