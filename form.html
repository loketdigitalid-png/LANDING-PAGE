<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIGU Festival 2026 - Form Pemesanan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f4f4f8;color:#111;padding-bottom:120px}
.container{max-width:900px;margin:auto}
.card{background:#fff;border-radius:28px;padding:28px;margin:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
.title{font-size:20px;font-weight:800;margin-bottom:18px;color:#7b2cff}
label{display:block;font-weight:600;margin-top:14px}
input,select,textarea{width:100%;padding:16px;margin-top:8px;border-radius:16px;border:2px solid #edf2f7}
.summary-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #eaeaea}
.total{font-size:28px;font-weight:900;color:#7b2cff}
.bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;padding:15px}
.btn{width:100%;padding:18px;border:none;border-radius:18px;background:linear-gradient(135deg,#7b2cff,#9d4edd);color:#fff;font-size:17px;font-weight:800}
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);color:#fff;justify-content:center;align-items:center;z-index:9999}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="title">Ringkasan Pesanan</div>
<div class="summary-row"><span>Jenis Tiket</span><strong id="jenisTiket">-</strong></div>
<div class="summary-row"><span>Jumlah Tiket</span><strong id="jumlahTiket">0</strong></div>
<div class="summary-row total"><span>Total</span><span id="totalBayar">Rp0</span></div>
</div>

<div class="card">
<div class="title">Data Pemesan</div>
<label>Nama Lengkap *</label><input id="nama">
<label>Jenis Identitas *</label><select id="identitas"><option value="">Pilih Identitas</option><option>KTP</option><option>SIM</option><option>Paspor</option></select>
<label>Nomor Identitas *</label><input id="nomorId">
<label>E-mail *</label><input id="email">
<label>No. WhatsApp *</label><input id="wa">
<label>Alamat *</label><textarea id="alamat"></textarea>
<label><input type="checkbox" id="setuju1"> Data benar</label>
<label><input type="checkbox" id="setuju2"> Setuju syarat</label>
</div>
</div>

<div class="bottom"><button class="btn" id="lanjut">LANJUT KE PEMBAYARAN</button></div>
<div id="loading">Sedang memproses...</div>

<script>
const $=id=>document.getElementById(id);
const total=localStorage.getItem("totalPembayaran")||0;
const jumlahTiket=localStorage.getItem("jumlahTiket")||0;
const jenisTiket=localStorage.getItem("jenisTiket")||"-";

$("totalBayar").textContent="Rp"+Number(total).toLocaleString("id-ID");
$("jumlahTiket").textContent=jumlahTiket;
$("jenisTiket").textContent=jenisTiket;

document.getElementById('lanjut').onclick=function(){

if(!$('nama').value.trim()){alert('Nama wajib diisi');return;}
if(!$('identitas').value){alert('Pilih identitas');return;}
if(!$('nomorId').value.trim()){alert('Nomor identitas wajib diisi');return;}
if(!$('email').value.trim()){alert('Email wajib diisi');return;}
if(!$('wa').value.trim()){alert('No WhatsApp wajib diisi');return;}
if(!$('alamat').value.trim()){alert('Alamat wajib diisi');return;}
if(!$('setuju1').checked || !$('setuju2').checked){
alert('Centang seluruh persetujuan');
return;
}

localStorage.setItem('nama',$('nama').value);
localStorage.setItem('identitas',$('identitas').value);
localStorage.setItem('nomorIdentitas',$('nomorId').value);
localStorage.setItem('email',$('email').value);
localStorage.setItem('wa',$('wa').value);
localStorage.setItem('alamat',$('alamat').value);

document.body.style.opacity='0';
document.body.style.transition='opacity .45s ease';
document.getElementById('loading').style.display='flex';

setTimeout(function(){
window.location.href='qris.html';
},800);
}
</script>
</body>
</html>
